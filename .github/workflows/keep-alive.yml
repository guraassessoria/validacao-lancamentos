name: Keep Render Alive

on:
  schedule:
    - cron: "*/14 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_URL }}/api/health")
          echo "Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Aviso: resposta inesperada ($STATUS)"
          fi
