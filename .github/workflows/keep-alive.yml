name: Keep Render Alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      RENDER_URL: ${{ secrets.RENDER_URL || 'https://validador-ct2.onrender.com' }}
    steps:
      - name: Ping
        run: |
          STATUS=$(curl -L -s -o /dev/null -w "%{http_code}" --max-time 120 --retry 2 --retry-delay 10 "$RENDER_URL/api/health")
          echo "Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Aviso: resposta inesperada ($STATUS)"
          fi
