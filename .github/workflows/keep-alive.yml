name: Keep Render Alive

on:
  schedule:
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      RENDER_URL: ${{ secrets.RENDER_URL || 'https://validador-ct2.onrender.com' }}
    steps:
      - name: Ping
        run: |
          START=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "Ping started at $START"
          echo "URL: $RENDER_URL/api/health"

          STATUS=$(curl -L -s -o /dev/null -w "%{http_code}" --max-time 120 --retry 3 --retry-delay 15 --retry-all-errors "$RENDER_URL/api/health")
          echo "Status: $STATUS"

          if [ "$STATUS" != "200" ]; then
            echo "Resposta inesperada ($STATUS)"
            exit 1
          fi
