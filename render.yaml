services:
  - type: web
    name: validador-ct2
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn scripts.backend:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATA_DIR
        value: /tmp/validador-ct2
      - key: DATABASE_URL
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: MAX_UPLOAD_MB
        value: 200
