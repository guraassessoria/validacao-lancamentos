services:
  - type: web
    name: validador-ct2
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn scripts.backend:app --host 0.0.0.0 --port $PORT
    disk:
      name: validador-ct2-data
      mountPath: /var/data
      sizeGB: 10
    envVars:
      - key: DATA_DIR
        value: /var/data
